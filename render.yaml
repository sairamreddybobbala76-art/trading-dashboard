services:
  - type: web
    name: trading-dashboard-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: FRONTEND_URL
        value: https://your-app.vercel.app   # ← update after deploying frontend
